services:
  mysql:
    image: mysql:8.0
    container_name: gf_v3_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: graduate_factory
      MYSQL_USER: gf
      MYSQL_PASSWORD: gf123456
    ports:
      - "3306:3306"
    volumes:
      - gf_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  gf_mysql_data: