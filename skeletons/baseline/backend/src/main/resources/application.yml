server:
  port: 8080

spring:
  application:
    name: thesis-app
  servlet:
    multipart:
      max-file-size: 10MB
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health,info

# thesis 段由 bake 按本项目能力重写（只保留用到的键；不含工厂 domain 编号）
thesis:
  title: ${PROJECT_TITLE}
  register-role: user
  password-hash: none
